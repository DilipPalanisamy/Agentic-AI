<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background:
                linear-gradient(135deg,
                    rgba(255, 40, 40, 0.55),
                    rgba(255, 140, 0, 0.55)),
                url("background.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 30px auto;
            padding: 40px;
            border: 4px solid transparent;
            background-image:
                linear-gradient(135deg, #fff8f5, #ffe9dc),
                linear-gradient(135deg, #0f172a, #2563eb, #38bdf8);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            border-radius: 24px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, .35),
                0 0 25px rgba(37, 99, 235, .35);
            transition: .3s;
        }

        .container:hover {
            transform: translateY(-3px);
            box-shadow:
                0 25px 70px rgba(0, 0, 0, .4),
                0 0 35px rgba(56, 189, 248, .45);
        }

        .tagline {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(90deg, #ff512f, #dd2476);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 25px;
            letter-spacing: .5px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 30px;
            color: #222;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input,
        select {
            width: 100%;
            padding: 13px;
            background: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 10px;
            font-size: 15px;
            transition: .3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border: 2px solid #ff6b00;
            box-shadow: 0 0 10px rgba(255, 107, 0, .25);
        }

        input[type=file] {
            padding: 10px;
        }

        /* Styling for the date input picker indicator */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }

        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            font-size: 15px;
        }

        .checkbox input {
            width: auto;
            transform: scale(1.1);
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #ff3d3d, #ff8c00);
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: .3s;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 90, 0, .40);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 15px;
            color: #333;
        }

        .footer a {
            color: #000000;
            text-decoration: none;
            font-weight: bold;
        }

        .footer a:hover {
            color: #ff6b00;
        }

        @media(max-width:768px) {
            .container {
                padding: 25px;
            }

            h2 {
                font-size: 24px;
            }

            .tagline {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="tagline">
            Your AI Career Companion for Jobs, Internships & Hackathons
        </p>

        <h2>Create Your Account</h2>

        <form id="registrationForm" action="/submit-registration" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="emailAddress">Email Address</label>
                <input type="email" id="emailAddress" name="emailAddress" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label for="mobileNumber">Mobile Number</label>
                <input type="tel" id="mobileNumber" name="mobileNumber" placeholder="+91 9876543210" required>
            </div>

            <div class="form-group">
                <label for="userType">User Type</label>
                <select id="userType" name="userType" required>
                    <option value="">Select Role</option>
                    <option value="student">Student</option>
                    <option value="professional">Professional</option>
                    <option value="recruiter">Recruiter</option>
                    <option value="company">Company</option>
                    <option value="organizer">Hackathon Organizer</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label for="preferredDomain">Preferred Domain</label>
                <select id="preferredDomain" name="preferredDomain">
                    <option value="ai">Artificial Intelligence</option>
                    <option value="ml">Machine Learning</option>
                    <option value="data_science">Data Science</option>
                    <option value="web_dev">Web Development</option>
                    <option value="app_dev">App Development</option>
                    <option value="cyber_security">Cyber Security</option>
                    <option value="cloud_computing">Cloud Computing</option>
                    <option value="devops">DevOps</option>
                    <option value="ui_ux">UI/UX</option>
                    <option value="blockchain">Blockchain</option>
                </select>
            </div>

            <div class="form-group">
                <label for="experienceLevel">Experience Level</label>
                <select id="experienceLevel" name="experienceLevel">
                    <option value="fresher">Fresher</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="experienced">Experienced</option>
                </select>
            </div>

            <div class="form-group">
                <label for="githubProfile">GitHub Profile</label>
                <input type="url" id="githubProfile" name="githubProfile" placeholder="https://github.com/username">
            </div>

            <div class="form-group">
                <label for="linkedinProfile">LinkedIn Profile</label>
                <input type="url" id="linkedinProfile" name="linkedinProfile" placeholder="https://linkedin.com/in/username">
            </div>

            <div class="form-group">
                <label for="resumeFile">Upload Resume</label>
                <input type="file" id="resumeFile" name="resumeFile" accept=".pdf,.doc,.docx">
            </div>

            <div class="checkbox">
                <input type="checkbox" id="termsAgreement" name="termsAgreement" required> 
                <label for="termsAgreement">I agree to the Terms & Conditions and Privacy Policy</label>
            </div>

        </form>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function (event) {
            const termsCheckbox = document.getElementById('termsAgreement');

            // JavaScript check to stop form submission if terms are not agreed to
            if (!termsCheckbox.checked) {
                event.preventDefault(); // Prevents navigating to the action URL
                alert('Please accept the Terms & Conditions and Privacy Policy to proceed.');
            }
        });
    </script>
</body>
</html>
