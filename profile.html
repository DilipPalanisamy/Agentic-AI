<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .profile-card {

            width: 420px;

            background: #1F2937;

            padding: 35px;

            border-radius: 15px;

            text-align: center;

            box-shadow: 0 0 20px rgba(0, 0, 0, .4);

        }

        .avatar {

            width: 120px;

            height: 120px;

            border-radius: 50%;

            background: #FACC15;

            color: #111827;

            font-size: 50px;

            font-weight: bold;

            display: flex;

            justify-content: center;

            align-items: center;

            margin: auto;

            margin-bottom: 20px;

        }

        h2 {

            color: white;

            margin-bottom: 5px;

        }

        p {

            color: #d1d5db;

            margin: 12px 0;

            font-size: 17px;

        }

        .info {

            text-align: left;

            margin-top: 25px;

        }

        .info div {

            background: #374151;

            padding: 15px;

            border-radius: 8px;

            margin-top: 15px;

            color: white;

        }

        label {

            color: #FACC15;

            font-weight: bold;

        }

        button {

            margin-top: 30px;

            width: 100%;

            padding: 12px;

            background: #FACC15;

            color: #111827;

            border: none;

            border-radius: 8px;

            font-size: 17px;

            font-weight: bold;

            cursor: pointer;

        }

        button:hover {

            background: #eab308;

        }

        .logout {

            background: red;

            color: white;

            margin-top: 15px;

        }

        .logout:hover {

            background: darkred;

        }
    </style>

</head>

<body>

    <div class="profile-card">

        <div class="avatar" id="avatar">
            U
        </div>

        <h2 id="username">User Name</h2>

        <p>Username</p>

        <div class="info">

            <div>

                <label>Email</label>

                <p id="email"></p>

            </div>

        </div>

        <button onclick="goHome()">

            Home

        </button>

        <button class="logout" onclick="logout()">

            Logout

        </button>

    </div>

    <script>

        let user = JSON.parse(localStorage.getItem("loggedInUser"));

        if (user) {

            document.getElementById("username").innerHTML = user.name;

            document.getElementById("email").innerHTML = user.email;

            if (user.picture) {
                document.getElementById("avatar").src = user.picture;
            }

        } else {

            alert("Please Login First");

            window.location.href = "index.html";

        }

        document.getElementById("username").innerHTML = user.name;

        document.getElementById("email").innerHTML = user.email;

        document.getElementById("avatar").innerHTML = user.name.charAt(0).toUpperCase();

        function goHome() {

            window.location.href = "dashboard.html";

        }

        function logout() {

            localStorage.removeItem("loggedInUser");

            alert("Logged Out Successfully");

            window.location.href = "index.html";

        }

    </script>

</body>

</html>
